services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    dockerCommand: node openclaw.mjs gateway --allow-unconfigured --bind lan --port 8080
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
