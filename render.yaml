services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    dockerCommand: node openclaw.mjs config set gateway.mode local --strict-json && node openclaw.mjs config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true --strict-json && node openclaw.mjs gateway --bind lan --port 8080
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
