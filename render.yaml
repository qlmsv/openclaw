services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /healthz
    envVars:
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_GATEWAY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
        value: "true"
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
